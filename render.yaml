# Render Blueprint for the FastAPI backend (free tier).
# Database is hosted separately on Neon (free) — set DATABASE_URL below.
# Frontend is hosted on Vercel (free) — see README "Deploy for free".
services:
  - type: web
    name: study-notes-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AUTO_CREATE_TABLES
        value: "true"
      - key: SECRET_KEY
        generateValue: true # Render generates a strong secret
      - key: DATABASE_URL
        sync: false # paste your Neon connection string in the dashboard
      - key: CORS_ORIGINS
        sync: false # set to your Vercel URL, e.g. https://study-notes.vercel.app
